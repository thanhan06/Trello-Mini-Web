services:
  db:
    image: postgres:16
    container_name: trello_postgres
    environment:
      POSTGRES_DB: trello
      POSTGRES_USER: trello
      POSTGRES_PASSWORD: trello123
    ports:
      - "5432:5432"
    volumes:
      - trello_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trello_redis
    ports:
      - "6379:6379"
    volumes:
      - trello_redisdata:/data

volumes:
  trello_pgdata: {}
  trello_redisdata: {}
