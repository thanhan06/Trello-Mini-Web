<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách sản phẩm</title>

    <script>
      // KIỂM TRA ĐĂNG NHẬP BẰNG JWT TOKEN PHÍA CLIENT-SIDE (đọc từ Cookie)
      function getCookie(name) {
        const match = document.cookie.match(
          new RegExp("(^| )" + name + "=([^;]+)"),
        );
        return match ? decodeURIComponent(match[2]) : null;
      }

      const token = getCookie("accessToken");

      if (!token) {
        alert("Bạn chưa đăng nhập hoặc phiên đã hết hạn!");
        window.location.href = "/";
      } else {
        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          if (payload.exp && payload.exp * 1000 < Date.now()) {
            // Xóa cookie hết hạn
            document.cookie = "accessToken=; Max-Age=0; path=/";
            alert("Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại!");
            window.location.href = "/";
          }
        } catch (error) {
          // Token không đúng format JWT
          document.cookie = "accessToken=; Max-Age=0; path=/";
          window.location.href = "/";
        }
      }
    </script>

    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}" />

    <script th:inline="javascript"></script>
    <script defer th:src="@{/js/product-list.js}"></script>
    <script defer th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <style>
      body {
        background-color: #a8e6ef !important;
      }
      .search-bar {
        background-color: #ffff00;
      }
      .btn-search {
        background-color: #d0d0d0;
        border: 1px solid #888;
        color: #000;
      }
      .user-info {
        color: #cc0000;
      }
      .btn-logout {
        color: #000;
        text-decoration: underline;
        background: none;
        border: none;
        cursor: pointer;
      }
      .pag-btn {
        background-color: #d0d0d0;
        border: 1px solid #888;
        color: #000;
        padding: 2px 8px;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .pag-btn.disabled {
        color: #aaa;
        pointer-events: none;
      }
      table {
        table-layout: fixed;
        width: 100%;
      }
      thead th {
        background-color: #00e600 !important;
        color: #000 !important;
        padding: 10px 8px !important;
        font-size: 1rem;
        overflow: hidden;
      }
      tbody td {
        font-size: 0.95rem;
        vertical-align: middle;
        overflow: hidden;
        word-break: break-word;
      }
      tbody td img {
        display: block;
        width: 70px;
        height: 70px;
        object-fit: cover;
      }
      tbody td input.qty-input {
        height: 36px;
        font-size: 0.95rem;
        width: 100%;
      }

      /* Tùy chỉnh viền form control (input) để tạo hiệu ứng nổi gờ (viền trên, trái dày và đậm hơn) */
      input.form-control,
      .custom-select-btn {
        border-top: 2px solid #888 !important;
        border-left: 2px solid #888 !important;
        border-bottom: 1px solid #ddd !important;
        border-right: 1px solid #ddd !important;
        border-radius: 0 !important; /* Xóa bo góc mặc định của Bootstrap */
      }

      .custom-select-btn {
        width: 150px;
        height: 31px;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0;
        padding: 0 30px 0 8px; /* space for the right button */
        color: #212529;
        position: relative;
        text-align: left;
        display: flex;
        align-items: center;
      }
      /* Ghi đè biểu tượng caret mặc định của Bootstrap */
      .custom-select-btn::after {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        width: 30px;
        background-color: #e9ecef; /* Màu xám ở góc phải */
        border-left: 1px solid #ced4da;
        background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
        background-repeat: no-repeat;
        background-size: 20px;
        background-position: center;
        border-top: none;
        border-bottom: none;
        border-right: none;
        margin-left: 0;
        vertical-align: middle;
      }
      .custom-select-btn:hover,
      .custom-select-btn:focus,
      .custom-select-btn:active {
        background-color: #fff !important;
        border-color: #ced4da !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Navbar: username/displayName lấy từ model (controller đã set qua UserDetails) -->
    <div class="d-flex justify-content-end align-items-center gap-3 px-3 py-2">
      <span class="user-info"
        >Xin chào, <strong id="helloUser" th:text="${username}"></strong
      ></span>
      <span class="user-info" id="displayName" th:text="${displayName}"></span>
      <button class="btn-logout" id="logoutLink">Đăng xuất</button>
    </div>

    <div class="container-fluid px-3">
      <h1 class="fs-4 fw-bold mb-2">Danh sách sản phẩm</h1>

      <!-- Search bar: dùng form GET, submit tự build URL, reset page=1 -->
      <form
        th:action="@{/shop/product-list}"
        method="get"
        class="search-bar px-2 py-2 mb-2"
        autocomplete="off"
      >
        <input type="hidden" name="page" value="1" />
        <input type="hidden" name="size" th:value="${pageSize}" />
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <label for="qName" class="col-form-label">Tên sản phẩm</label>
          </div>
          <div class="col-auto">
            <input
              id="qName"
              name="name"
              type="text"
              class="form-control form-control-sm"
              th:value="${searchName}"
            />
          </div>

          <div class="col-auto" style="margin-left: 30px">
            <label for="qType" class="col-form-label">Loại sản phẩm</label>
          </div>
          <div class="col-auto">
            <!-- Dùng cấu trúc Dropdown của Bootstrap để thay thế thẻ select native, cho phép tùy chỉnh chiều cao (max-height) -->
            <div class="dropdown">
              <input
                type="hidden"
                name="type"
                id="qTypeHidden"
                th:value="${searchType}"
              />
              <button
                class="btn btn-sm text-start custom-select-btn"
                type="button"
                id="qTypeDropdown"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <span
                  id="qTypeLabel"
                  style="
                    width: 100%;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    white-space: nowrap;
                  "
                ></span>
              </button>
              <!-- Giới hạn max-height để hiển thị đúng 3 dòng (mỗi dòng ~30-32px), có thanh cuộn nếu vượt quá -->
              <ul
                class="dropdown-menu w-100 shadow-sm"
                aria-labelledby="qTypeDropdown"
                style="max-height: 100px; overflow-y: auto; padding: 0"
              >
                <li>
                  <a class="dropdown-item py-1" href="#" data-value=""
                    >&nbsp;</a
                  >
                </li>
                <li th:each="type : ${productTypes}">
                  <a
                    class="dropdown-item py-1"
                    href="#"
                    th:data-value="${type.producttypeId}"
                    th:text="${type.name}"
                  ></a>
                </li>
              </ul>
            </div>
          </div>

          <div class="col-auto" style="margin-left: 30px">
            <label for="qDesc" class="col-form-label">Mô tả</label>
          </div>
          <div class="col-auto" style="width: 300px">
            <input
              id="qDesc"
              name="desc"
              type="text"
              class="form-control form-control-sm"
              th:value="${searchDesc}"
            />
          </div>

          <div class="col-auto ms-auto">
            <button type="submit" class="btn btn-search btn-sm">
              Tìm kiếm
            </button>
          </div>
        </div>
      </form>

      <!-- Pagination: dùng searchName/Type/Desc từ model để giữ điều kiện khi chuyển trang -->
      <div
        th:if="${totalPages > 0}"
        class="d-flex justify-content-between align-items-center mb-2"
      >
        <div class="d-flex align-items-center gap-1">
          <a
            class="pag-btn"
            th:classappend="${currentPage <= 1} ? ' disabled'"
            th:href="@{/shop/product-list(page=1, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}"
            >&laquo;</a
          >
          <a
            class="pag-btn"
            th:classappend="${currentPage <= 1} ? ' disabled'"
            th:href="@{/shop/product-list(page=${currentPage > 1 ? currentPage - 1 : 1}, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}"
            >&lsaquo;</a
          >
          <span class="ms-1">Previous</span>
        </div>
        <div class="d-flex align-items-center gap-1">
          <span class="me-1">Next</span>
          <a
            class="pag-btn"
            th:classappend="${currentPage >= totalPages} ? ' disabled'"
            th:href="@{/shop/product-list(page=${currentPage < totalPages ? currentPage + 1 : totalPages}, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}"
            >&rsaquo;</a
          >
          <a
            class="pag-btn"
            th:classappend="${currentPage >= totalPages} ? ' disabled'"
            th:href="@{/shop/product-list(page=${totalPages}, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}"
            >&raquo;</a
          >
        </div>
      </div>

      <!-- Table -->
      <table class="table table-bordered mb-2">
        <thead>
          <tr>
            <th style="width: 6%">No.</th>
            <th style="width: 13%">Hình ảnh</th>
            <th style="width: 22%">Tên sản phẩm</th>
            <th style="width: 45%">Mô tả</th>
            <th style="width: 14%">Số lượng</th>
          </tr>
        </thead>
        <tbody id="productTbody">
          <tr th:each="product, stat : ${products}">
            <td th:text="${stat.index + 1 + (currentPage - 1) * pageSize}"></td>
            <td>
              <img
                th:if="${product.productImg != null}"
                th:src="${product.productImg}"
                alt="img"
              />
            </td>
            <td th:text="${product.productName}"></td>
            <td th:text="${product.description}"></td>
            <td>
              <input
                type="number"
                class="form-control form-control-sm qty-input"
                min="0"
                th:data-id="${product.productId}"
                th:data-max="${product.productAmount - (product.orderProductAmount != null ? product.orderProductAmount : 0)}"
                th:data-order="${product.orderProductAmount != null ? product.orderProductAmount : 0}"
                th:data-name="${product.productName}"
                th:data-status="${product.status}"
                placeholder=""
              />
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="5" class="text-center text-muted py-3">
              Không tìm thấy sản phẩm nào.
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Đặt hàng -->
      <div class="d-flex align-items-center gap-3">
        <button
          type="button"
          id="btnOrder"
          class="btn btn-sm"
          style="background-color: #d0d0d0; border: 1px solid #888"
        >
          Đặt hàng
        </button>
        <span id="statusText" class="text-danger fw-bold"></span>
      </div>
    </div>

    <!-- Move script logic to separated js file -->
    <script defer th:src="@{/js/product-state-v2.js}"></script>
  </body>
</html>
