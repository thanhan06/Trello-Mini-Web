<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách sản phẩm</title>

    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}" />

    <script th:inline="javascript"></script>
    <script defer th:src="@{/js/product-list.js}"></script>
    <script defer th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <style>
      body { background-color: #a8e6ef !important; }
      .search-bar { background-color: #ffff00; }
      .btn-search { background-color: #d0d0d0; border: 1px solid #888; color: #000; }
      .user-info { color: #cc0000; }
      .btn-logout { color: #000; text-decoration: underline; background: none; border: none; cursor: pointer; }
      .pag-btn { background-color: #d0d0d0; border: 1px solid #888; color: #000; padding: 2px 8px; text-decoration: none; font-size: 0.9rem; }
      .pag-btn.disabled { color: #aaa; pointer-events: none; }
      table { table-layout: fixed; width: 100%; }
      thead th { background-color: #00e600 !important; color: #000 !important; padding: 10px 8px !important; font-size: 1rem; overflow: hidden; }
      tbody td { font-size: 0.95rem; vertical-align: middle; overflow: hidden; word-break: break-word; }
      tbody td img { display: block; width: 70px; height: 70px; object-fit: cover; }
      tbody td input.qty-input { height: 36px; font-size: 0.95rem; width: 100%; }

      /* Tùy chỉnh viền form control (input) để tạo hiệu ứng nổi gờ (viền trên, trái dày và đậm hơn) */
      input.form-control, .custom-select-btn {
        border-top: 2px solid #888 !important;
        border-left: 2px solid #888 !important;
        border-bottom: 1px solid #ddd !important;
        border-right: 1px solid #ddd !important;
        border-radius: 0 !important; /* Xóa bo góc mặc định của Bootstrap */
      }
      
      .custom-select-btn {
        width: 150px;
        height: 31px;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0;
        padding: 0 30px 0 8px; /* space for the right button */
        color: #212529;
        position: relative;
        text-align: left;
        display: flex;
        align-items: center;
      }
      /* Ghi đè biểu tượng caret mặc định của Bootstrap */
      .custom-select-btn::after {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        width: 30px;
        background-color: #e9ecef; /* Màu xám ở góc phải */
        border-left: 1px solid #ced4da;
        background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
        background-repeat: no-repeat;
        background-size: 20px;
        background-position: center;
        border-top: none;
        border-bottom: none;
        border-right: none;
        margin-left: 0;
        vertical-align: middle;
      }
      .custom-select-btn:hover,
      .custom-select-btn:focus,
      .custom-select-btn:active {
        background-color: #fff !important; 
        border-color: #ced4da !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>

    <!-- Navbar: username/displayName lấy từ model (controller đã set qua UserDetails) -->
    <div class="d-flex justify-content-end align-items-center gap-3 px-3 py-2">
      <span class="user-info">Xin chào, <strong id="helloUser" th:text="${username}"></strong></span>
      <span class="user-info" id="displayName" th:text="${displayName}"></span>
      <button class="btn-logout" id="logoutLink">Đăng xuất</button>
    </div>

    <div class="container-fluid px-3">

      <h1 class="fs-4 fw-bold mb-2">Danh sách sản phẩm</h1>

      <!-- Search bar: dùng form GET, submit tự build URL, reset page=1 -->
      <form th:action="@{/shop/product-list}" method="get" class="search-bar px-2 py-2 mb-2" autocomplete="off">
        <input type="hidden" name="page" value="1" />
        <input type="hidden" name="size" th:value="${pageSize}" />
        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <label for="qName" class="col-form-label">Tên sản phẩm</label>
          </div>
          <div class="col-auto">
            <input id="qName" name="name" type="text" class="form-control form-control-sm"
                   th:value="${searchName}" />
          </div>

          <div class="col-auto" style="margin-left: 30px;">
            <label for="qType" class="col-form-label">Loại sản phẩm</label>
          </div>
          <div class="col-auto">
            <!-- Dùng cấu trúc Dropdown của Bootstrap để thay thế thẻ select native, cho phép tùy chỉnh chiều cao (max-height) -->
            <div class="dropdown">
              <input type="hidden" name="type" id="qTypeHidden" th:value="${searchType}" />
              <button class="btn btn-sm text-start custom-select-btn" 
                      type="button" id="qTypeDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <span id="qTypeLabel" style="width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
              </button>
              <!-- Giới hạn max-height để hiển thị đúng 3 dòng (mỗi dòng ~30-32px), có thanh cuộn nếu vượt quá -->
              <ul class="dropdown-menu w-100 shadow-sm" aria-labelledby="qTypeDropdown" style="max-height: 100px; overflow-y: auto; padding: 0;">
                <li><a class="dropdown-item py-1" href="#" data-value="">&nbsp;</a></li>
                <li th:each="type : ${productTypes}">
                  <a class="dropdown-item py-1" href="#" 
                     th:data-value="${type.producttypeId}" 
                     th:text="${type.name}"></a>
                </li>
              </ul>
            </div>
          </div>

          <div class="col-auto" style="margin-left: 30px;">
            <label for="qDesc" class="col-form-label">Mô tả</label>
          </div>
          <div class="col-auto" style="width: 300px;">
            <input id="qDesc" name="desc" type="text" class="form-control form-control-sm"
                   th:value="${searchDesc}" />
          </div>

          <div class="col-auto ms-auto">
            <button type="submit" class="btn btn-search btn-sm">Tìm kiếm</button>
          </div>
        </div>
      </form>

      <!-- Pagination: dùng searchName/Type/Desc từ model để giữ điều kiện khi chuyển trang -->
      <div th:if="${totalPages > 0}" class="d-flex justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-1">
          <a class="pag-btn" th:classappend="${currentPage <= 1} ? ' disabled'"
             th:href="@{/shop/product-list(page=1, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}">&laquo;</a>
          <a class="pag-btn" th:classappend="${currentPage <= 1} ? ' disabled'"
             th:href="@{/shop/product-list(page=${currentPage > 1 ? currentPage - 1 : 1}, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}">&lsaquo;</a>
          <span class="ms-1">Previous</span>
        </div>
        <div class="d-flex align-items-center gap-1">
          <span class="me-1">Next</span>
          <a class="pag-btn" th:classappend="${currentPage >= totalPages} ? ' disabled'"
             th:href="@{/shop/product-list(page=${currentPage < totalPages ? currentPage + 1 : totalPages}, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}">&rsaquo;</a>
          <a class="pag-btn" th:classappend="${currentPage >= totalPages} ? ' disabled'"
             th:href="@{/shop/product-list(page=${totalPages}, size=${pageSize}, name=${searchName}, type=${searchType}, desc=${searchDesc})}">&raquo;</a>
        </div>
      </div>

      <!-- Table -->
      <table class="table table-bordered mb-2">
        <thead>
          <tr>
            <th style="width:6%">No.</th>
            <th style="width:13%">Hình ảnh</th>
            <th style="width:22%">Tên sản phẩm</th>
            <th style="width:45%">Mô tả</th>
            <th style="width:14%">Số lượng</th>
          </tr>
        </thead>
        <tbody id="productTbody">
          <tr th:each="product, stat : ${products}">
            <td th:text="${stat.index + 1 + (currentPage - 1) * pageSize}"></td>
            <td>
              <img
                th:if="${product.productImg != null}"
                th:src="${product.productImg}"
                alt="img"
              />
            </td>
            <td th:text="${product.productName}"></td>
            <td th:text="${product.description}"></td>
            <td>
              <input type="number" class="form-control form-control-sm qty-input"
                     min="0"
                     th:data-id="${product.productId}"
                     th:data-max="${product.productAmount - (product.orderProductAmount != null ? product.orderProductAmount : 0)}"
                     th:data-order="${product.orderProductAmount != null ? product.orderProductAmount : 0}"
                     th:data-name="${product.productName}"
                     th:data-status="${product.status}"
                     placeholder="" />
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="5" class="text-center text-muted py-3">Không tìm thấy sản phẩm nào.</td>
          </tr>
        </tbody>
      </table>

      <!-- Đặt hàng -->
      <div class="d-flex align-items-center gap-3">
        <button type="button" id="btnOrder" class="btn btn-sm" style="background-color:#d0d0d0; border:1px solid #888;">Đặt hàng</button>
        <span id="statusText" class="text-danger fw-bold"></span>
      </div>

    </div>

    <script>
      // ============================================================================
      // 1. XỬ LÝ KHI NGƯỜI DÙNG RELOAD TRANG (BẤM F5 HOẶC TẢI LẠI)
      // ============================================================================
      // Kiểm tra API Performance của trình duyệt để biết nguyên nhân tải trang
      if (window.performance) {
        // Lấy danh sách các sự kiện điều hướng trang (cách trang được load)
        const navEntries = window.performance.getEntriesByType("navigation");
        // Nếu trang được load qua hành động "reload" (người dùng ấn F5 hoặc Ctrl+R)
        if (navEntries.length > 0 && navEntries[0].type === "reload") {
          // Xóa toàn bộ dữ liệu giỏ hàng lưu tạm trong phiên làm việc hiện tại
          sessionStorage.removeItem('cartQty');
          // Nếu URL có chứa các tiêu chí tìm kiếm (query parameters như ?name=...&page=...)
          if (window.location.search !== "") {
            // Chuyển hướng người dùng về lại trang danh sách gốc (URL không chứa parameter)
            // Việc này giúp xóa trắng các ô điều kiện tìm kiếm.
            window.location.href = window.location.pathname;
          }
        }
      }

      // ============================================================================
      // 2. KHÔI PHỤC DỮ LIỆU KHI TRANG VỪA TẢI XONG (Bao gồm chuyển trang, back/forward)
      // ============================================================================
      document.addEventListener('DOMContentLoaded', function () {
        
        // --- A. XỬ LÝ SỰ KIỆN VÀ HIỂN THỊ DROPDOWN LOẠI SẢN PHẨM ---
        const qTypeHidden = document.getElementById('qTypeHidden'); // Ẩn để submit form
        const qTypeLabel = document.getElementById('qTypeLabel');   // Chữ hiển thị trên dropdown
        const drpItems = document.querySelectorAll('#qTypeDropdown + .dropdown-menu .dropdown-item'); // Các item trong menu sổ xuống

        let initialMatched = false; // Biến cờ kiểm tra xem type đang tìm kiếm có trùng mục nào trong danh sách không
        drpItems.forEach(item => {
          // Khi mới load, nếu value của item nào trong menu trùng với giá trị đang lưu trong hidden input 
          // (giá trị này do Backend set từ Controller truyền xuống qua model)
          if (item.getAttribute('data-value') === qTypeHidden.value) {
             // Cập nhật nhãn hiển thị thành tên loại sản phẩm (nếu nội dung là trắng \xa0 thì hiển thị chuỗi rỗng)
             qTypeLabel.textContent = item.textContent === '\xa0' ? '' : item.textContent;
             initialMatched = true; // Đánh dấu là đã tìm thấy
          }
          
          // Lắng nghe sự kiện click trên từng item của menu dropdown
          item.addEventListener('click', function(e) {
            e.preventDefault(); // Ngăn hành vi cuộn mặc định của thẻ <a>
            const val = this.getAttribute('data-value'); // Lấy giá trị ID của Loại SP
            qTypeHidden.value = val; // Gán ID đó vào thẻ input ẩn để chuẩn bị submit form
            // Thay đổi chữ trên nút bấm cho khớp với Loại bạn vừa chọn
            qTypeLabel.textContent = this.textContent === '\xa0' ? '' : this.textContent;
          });
        });
        // Nếu không có bất kì value nào khớp (hoặc searchType null), để trắng nhãn Dropdown
        if(!initialMatched) qTypeLabel.textContent = ''; 

        // --- B. KHÔI PHỤC DỮ LIỆU CÁC Ô NHẬP SỐ LƯỢNG SẢN PHẨM ---
        // Lấy chuỗi JSON giỏ hàng từ Session. Nếu không có thì fallback về chuỗi gán object rỗng '{}'
        const storedCart = JSON.parse(sessionStorage.getItem('cartQty') || '{}');
        const inputs = document.querySelectorAll('.qty-input'); // Lấy tất cả ô nhập liệu số lượng trên form
        
        inputs.forEach(function (input) {
          const productId = input.dataset.id; // Mã SP lưu trong th:data-id
          
          // Kiểm tra xem SP này đã có dữ liệu nhập trong session chưa
          if (storedCart[productId]) {
            // Nếu có, tự động điền lại giá trị vào UI cho người dùng
            input.value = storedCart[productId];
            // Đồng thời validate lại (đề phòng ai đó sửa bậy bạ biến session bằng F12)
            const numVal = Number(input.value);
            // Nếu dữ liệu khôi phục không phải là số hợp lệ -> đánh dấu ô hiển thị viền đỏ
            if (isNaN(numVal) || !Number.isInteger(numVal) || numVal < 0) {
              input.classList.add('is-invalid');
            }
          }
        });
      });

      // ============================================================================
      // 3. VALIDATE LOGIC NGAY KHI NGƯỜI DÙNG ĐANG GÕ VÀO Ô SỐ LƯỢNG
      // ============================================================================
      const statusText = document.getElementById('statusText'); // Chỗ hiển thị chữ lỗi
      const inputs = document.querySelectorAll('.qty-input');
      
      inputs.forEach(function (input) {
        input.addEventListener('input', function () {
          // Mỗi phím gõ xuống thì reset lại trạng thái lỗi trước đó
          statusText.textContent = '';
          input.classList.remove('is-invalid');
          input.removeAttribute('title'); // Gỡ tooltip báo lỗi
          
          const rawValue = input.value; // Lấy chuỗi thô người dùng gõ
          const numVal = Number(rawValue); // Ép kiểu thử sang dạng Số
          const max = parseInt(input.dataset.max, 10); // Lấy giới hạn tồn kho max từ th:data-max
          const productId = input.dataset.id; 
          const name = input.dataset.name;

          // Đọc giỏ session hiện tại lên (để add vào hoặc xóa đi)
          const storedCart = JSON.parse(sessionStorage.getItem('cartQty') || '{}');

          // TÌNH HUỐNG 1: Người dùng xóa trắng ô input -> Xóa SP này khỏi giỏ session
          if (!rawValue) {
             delete storedCart[productId];
          } 
          // TÌNH HUỐNG 2: Nhập bậy (Chữ cái, số thập phân, số âm) -> Báo lỗi & xóa khỏi session
          else if (isNaN(numVal) || !Number.isInteger(numVal) || numVal < 0) {
             statusText.textContent = 'Số lượng nhập của ' + name + ' phải là số nguyên dương (không chứa dấu thập phân, âm).';
             input.classList.add('is-invalid'); // Tô viền đỏ ô input
             input.title = 'Vui lòng nhập số nguyên dương';
             delete storedCart[productId]; // Xóa dữ liệu rác này để không ghim vào Giỏ
          } 
          // TÌNH HUỐNG 3: Nhập Số nguyên hợp lệ
          else {
             // Nếu số lớn hơn tồn kho thực tế -> Tô cảnh báo nhưng VẪN cho vào Session để người dùng xem lại
             if (numVal > max) {
               statusText.textContent = 'Số lượng nhập của ' + name + ' vượt quá ' + max;
               input.classList.add('is-invalid');
               input.title = 'Tồn kho chỉ còn ' + max;
             }
             
             // Nếu nhập số 0 hệt như chưa nhập -> Xóa đi luôn
             if (numVal === 0) {
               delete storedCart[productId];
             } else {
               // Còn không thì chính thức ghi đè/lưu số lượng của SP này vào bộ Session chung
               storedCart[productId] = numVal;
             }
          }
          
          // Ghi ngược trở lại JSON object vào RAM SessionStorage 
          // -> Nếu lật sang trang 2, session này vẫn sống.
          sessionStorage.setItem('cartQty', JSON.stringify(storedCart));
        });
      });

      // ============================================================================
      // 4. KIỂM TRA CHỐT CHẶN CUỐI CÙNG KHI BẤM NÚT "ĐẶT HÀNG"
      // ============================================================================
      document.getElementById('btnOrder').addEventListener('click', function () {
        const statusText = document.getElementById('statusText');
        const inputs = document.querySelectorAll('.qty-input');
        const errors = []; // Mảng chứa các dòng báo lỗi nếu có

        // Lọc tất cả ô input chỉ lấy các sản phẩm chưa bị vô hiệu hóa (status === false)
        const enabledInputs = Array.from(inputs).filter(function (input) {
          return input.dataset.status === 'false';
        });

        // Kéo giỏ hàng toàn cục hiện đang có trong máy lên
        const storedCart = JSON.parse(sessionStorage.getItem('cartQty') || '{}');
        // Chỉ lấy ra danh sách các ProductId có số lượng lớn hơn 0
        const productIdsInCart = Object.keys(storedCart).filter(id => storedCart[id] > 0);

        // B1: CHECK LỖI TYPO
        let hasInvalidInput = false;
        enabledInputs.forEach(function(input) {
           const numVal = Number(input.value);
           // Kiểm tra xem hiện trên màn hình UI có ô nào đang chứa chữ cái hay phẩy/âm không
           const isInvalidNumber = input.value && (isNaN(numVal) || !Number.isInteger(numVal) || numVal < 0);

           // Nếu ô đó đang bị class 'is-invalid' từ lúc gõ, hoặc vừa phát hiện là number hỏng dở
           if (input.classList.contains('is-invalid') || isInvalidNumber) {
               hasInvalidInput = true;
               input.classList.add('is-invalid');
               if (isInvalidNumber) {
                 errors.push('"' + input.dataset.name + '": Số lượng phải là số nguyên hợp lệ (không chứa phần thập phân hoặc âm).');
               }
           }
        });

        // Nếu kẹt ở B1 (Lỗi type) thì văng ngay không cho qua
        if (hasInvalidInput) {
           if (errors.length === 0) errors.push('Vui lòng sửa các lỗi nhập liệu (được tô đỏ).');
           statusText.innerHTML = 'Lỗi nhập liệu:<br>' + errors.join('<br>');
           return;
        }

        // B2: CHECK GIỎ CÓ TRỐNG KHÔNG
        // Nếu Session ghi nhận mọi thứ sạch trơn (người dùng chưa nhập bất cứ số nào > 0 ở trang này cũng như trang trước)
        if (productIdsInCart.length === 0) {
          statusText.textContent = 'Vui lòng nhập số lượng hợp lệ cho ít nhất một sản phẩm.';
          return;
        }

        // B3: CHECK LỖI TỒN KHO OVER (VƯỢT TRẦN)
        enabledInputs.forEach(function (input) {
          const rawValue = input.value;
          if (!rawValue) return;
          
          const val = parseInt(rawValue, 10);
          const max = parseInt(input.dataset.max, 10);
          const name = input.dataset.name;

          // Nếu phát hiện trên giao diện chừa lại 1 ô vượt Max, add message vào và chặn
          if (val > max) {
            errors.push('"' + name + '": đã nhập ' + val + ', nhưng tồn kho khả dụng chỉ còn ' + max);
            input.classList.add('is-invalid');
          }
        });

        // TỔNG KẾT
        if (errors.length > 0) {
          // Bể kèo, In danh sách lỗi bằng tag <br> xuống dòng
          statusText.innerHTML = 'Lỗi đặt hàng:<br>' + errors.join('<br>');
        } else {
          // Okie qua tọt 
          statusText.textContent = '';
          
          // Mẹo chuyển trang: Lưu lại đoạn String thông số đường dẫn trên thanh URL hiện tại (VD: ?page=2&name=abc)
          // Để lát nữa nếu user Cancel trên màn Order thì chèn ngược String này lại vào để về đúng y vị trí cũ.
          sessionStorage.setItem('lastSearchUrl', window.location.search);
          
          // Điều hướng chuyển trang Order để tiến hành xem thông tin đặt
          window.location.href = '/shop/product-order';
        }
      });
    </script>

  </body>
</html>
